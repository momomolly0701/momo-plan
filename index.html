const CK=[{l:"竞品分析",t:"完成20个账号分析表"},{l:"品牌定位",t:"完成500字定位文档"},{l:"供应商",t:"确定3-5家备选供应商"},{l:"首批采购",t:"到货20-30件样品"},{l:"账号搭建",t:"小红书+闲鱼就绪"},{l:"小红书",t:"发布至少5篇笔记"},{l:"闲鱼上架",t:"上架10-15件商品"},{l:"Zotero",t:"文献管理搭建完成"},{l:"文献阅读",t:"完成8篇核心文献笔记"},{l:"雅思评估",t:"基础分评估+确定考试时间"},{l:"院校调研",t:"开始调研荷兰/北欧院校"}];

let S={at:"today",sm:"2026-03",tc:{},cc:{},mn:{}};
let CFG={binId:"",apiKey:"",syncing:false,lastSync:""};

function ldCfg(){try{const c=localStorage.getItem("momo-cfg");if(c)Object.assign(CFG,JSON.parse(c))}catch(e){}}
function svCfg(){try{localStorage.setItem("momo-cfg",JSON.stringify(CFG))}catch(e){}}

// Local storage (always works as backup)
function ldLocal(){try{const s=localStorage.getItem("momo-v5");if(s)Object.assign(S,JSON.parse(s))}catch(e){}}
function svLocal(){try{localStorage.setItem("momo-v5",JSON.stringify({tc:S.tc,cc:S.cc,mn:S.mn,at:S.at,sm:S.sm}))}catch(e){}}

// Cloud sync via JSONBin
async function cloudSave(){
  if(!CFG.binId||!CFG.apiKey)return;
  CFG.syncing=true;renderSyncStatus();
  try{
    const data={tc:S.tc,cc:S.cc,mn:S.mn};
    await fetch("https://api.jsonbin.io/v3/b/"+CFG.binId,{
      method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":CFG.apiKey},
      body:JSON.stringify(data)
    });
    CFG.lastSync=new Date().toLocaleString("zh-CN");svCfg();
  }catch(e){console.log("sync save err",e)}
  CFG.syncing=false;renderSyncStatus();
}

async function cloudLoad(){
  if(!CFG.binId||!CFG.apiKey)return false;
  try{
    const r=await fetch("https://api.jsonbin.io/v3/b/"+CFG.binId+"/latest",{
      headers:{"X-Master-Key":CFG.apiKey}
    });
    const j=await r.json();
    if(j.record){
      if(j.record.tc)S.tc=j.record.tc;
      if(j.record.cc)S.cc=j.record.cc;
      if(j.record.mn)S.mn=j.record.mn;
      svLocal();
      CFG.lastSync=new Date().toLocaleString("zh-CN");svCfg();
      return true;
    }
  }catch(e){console.log("sync load err",e)}
  return false;
}

// Create new bin
async function createBin(){
  if(!CFG.apiKey)return;
  try{
    const r=await fetch("https://api.jsonbin.io/v3/b",{
      method:"POST",headers:{"Content-Type":"application/json","X-Master-Key":CFG.apiKey,"X-Bin-Private":true},
      body:JSON.stringify({tc:{},cc:{},mn:{}})
    });
    const j=await r.json();
    if(j.metadata&&j.metadata.id){CFG.binId=j.metadata.id;svCfg();return true}
  }catch(e){console.log("create bin err",e)}
  return false;
}

let syncTimer;
function sv(){svLocal();clearTimeout(syncTimer);syncTimer=setTimeout(cloudSave,2000)}
function ld(){ldCfg();ldLocal()}

function renderSyncStatus(){
  const el=document.getElementById("syncDot");
  if(el)el.style.background=CFG.syncing?"var(--yellow)":((CFG.binId&&CFG.apiKey)?"var(--gd)":"var(--coral)");
}

const td=new Date(),tD=td.getDate(),tMo=td.getMonth()+1,tS=tMo+"/"+tD;

function gMP(id){const m=M.find(x=>x.id===id);if(!m)return 0;const t=m.ec.length+m.pd.length;let d=0;m.ec.forEach((_,i)=>{if(S.cc[id+"-e-"+i])d++});m.pd.forEach((_,i)=>{if(S.cc[id+"-p-"+i])d++});return t?Math.round(d/t*100):0}
function gTP(){let t=0,d=0;MT.forEach((w,wi)=>{w.d.forEach((dy,di)=>{dy.e.forEach((_,ti)=>{t++;if(S.tc[wi+"-"+di+"-e-"+ti])d++});dy.p.forEach((_,ti)=>{t++;if(S.tc[wi+"-"+di+"-p-"+ti])d++})})});return t?Math.round(d/t*100):0}
function gCP(){let d=0;CK.forEach((_,i)=>{if(S.cc["mc-"+i])d++});return Math.round(d/CK.length*100)}

function pb(v,c){return'<div class="pb"><div class="pf" style="width:'+v+"%;background:"+c+'"></div></div>'}
function ci(k,txt,st){const ck=S[st][k];return'<div class="check-item" onclick="tog(\''+st+"','"+k+'\')"><div class="cb '+(ck?"ck":"")+'">'+( ck?"✓":"")+'</div><span class="ct '+(ck?"ck":"")+'">'+txt+"</span></div>"}
function ptg(p){const l={1:"启动期 70:30",2:"成长期 50:50",3:"收获期 30:70"};return'<span class="pt p'+p+'">'+l[p]+"</span>"}
function fTd(){for(let wi=0;wi<MT.length;wi++)for(let di=0;di<MT[wi].d.length;di++){const d=MT[wi].d[di];if(d.dt.startsWith(tS+" "))return{...d,wi,di,wk:MT[wi].w}}return null}

function render(){
document.getElementById("dateDisplay").innerHTML=td.getFullYear()+"."+tMo+"."+tD;
const tabs=[{id:"today",lb:"☀️ 今日",bg:null},{id:"march",lb:"✅ 3月",bg:gTP()},{id:"monthly",lb:"🎯 月度",bg:null},{id:"timeline",lb:"🗺️ 全局",bg:null}];
document.getElementById("tabs").innerHTML=tabs.map(t=>'<button class="tab-btn '+(S.at===t.id?"active":"")+'" onclick="go(\''+t.id+'\')">'+t.lb+(t.bg!==null?'<span class="badge">'+t.bg+"%</span>":"")+"</button>").join("");
const el=document.getElementById("content");
if(S.at==="today")el.innerHTML=rToday();
else if(S.at==="march")el.innerHTML=rMarch();
else if(S.at==="monthly")el.innerHTML=rMo();
else el.innerHTML=rTL()}

function rToday(){
const t=fTd();let h="";
const tp=gTP(),cp=gCP(),mp=gMP("2026-03");
h+='<div class="stat-row"><div class="stat-chip" style="background:var(--ys)"><div class="num" style="color:var(--text)">'+tp+'%</div><div class="lbl">3月进度</div></div><div class="stat-chip" style="background:var(--ps)"><div class="num" style="color:var(--ecom)">'+cp+'%</div><div class="lbl">检查点</div></div><div class="stat-chip" style="background:var(--gs)"><div class="num" style="color:var(--phd)">'+mp+'%</div><div class="lbl">月度目标</div></div></div>';

if(t){
h+='<div class="card card-l"><div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><span style="font-size:22px">☀️</span><h2 style="font-family:Playfair Display,serif;font-size:22px;font-weight:400;font-style:italic">'+t.dt+'</h2></div><p style="font-size:12px;color:var(--tmu);margin-bottom:18px;font-style:italic">'+t.wk+'</p>';

t.p.forEach((task,i)=>{h+=ci(t.wi+"-"+t.di+"-p-"+i,task,"tc")});
h+='</div></div></div>';
}else{h+='<div class="card card-l es"><div class="ic">🌿</div><h3>Today is free</h3><p>查看「3月」标签了解完整任务安排</p></div>'}

h+='<div class="card card-pc"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><h3 style="font-family:Playfair Display,serif;font-size:17px;font-weight:400;font-style:italic">Milestones</h3><span style="font-size:13px;font-weight:700;color:var(--acc)">'+gCP()+'%</span></div>'+pb(gCP(),"var(--acc)")+'<div style="margin-top:14px">';
CK.forEach((item,i)=>{h+=ci("mc-"+i,"<strong>"+item.l+"</strong> — "+item.t,"cc")});
h+="</div></div>";return h}

function rMarch(){
let h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px"><h2 class="st">March To-Do</h2><div style="display:flex;align-items:center;gap:8px"><span style="font-size:12px;color:var(--tmu);font-weight:600">'+gTP()+'%</span><div style="width:80px">'+pb(gTP(),"var(--acc)")+"</div></div></div>";
MT.forEach((week,wi)=>{
h+='<div class="wh">'+week.w+"</div>";
week.d.forEach((day,di)=>{
const isT=day.dt.startsWith(tS+" ");
h+='<div class="dc '+(isT?"ist":"")+'"><div class="dt">'+(isT?'<span class="tb">TODAY</span>':"")+day.dt+"</div>";
h+='<div class="tc"><div><div style="margin-bottom:6px"><span class="pill pill-e" style="font-size:10px;padding:2px 10px">🛒 电商</span></div>';
day.e.forEach((t,ti)=>{h+=ci(wi+"-"+di+"-e-"+ti,t,"tc")});
h+='</div><div><div style="margin-bottom:6px"><span class="pill pill-p" style="font-size:10px;padding:2px 10px">🎓 博士</span></div>';
day.p.forEach((t,ti)=>{h+=ci(wi+"-"+di+"-p-"+ti,t,"tc")});
h+="</div></div></div>"});h+='<div style="height:12px"></div>'});return h}

function rMo(){
const m=M.find(x=>x.id===S.sm);
let h='<div class="ms">'+M.map(x=>'<button class="mb '+(S.sm===x.id?"ac":"")+'" onclick="sm(\''+x.id+'\')">'+x.mo+"</button>").join("")+"</div>";
if(!m)return h;const prog=gMP(m.id);
h+='<div class="card card-w"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap"><h2 style="font-family:Playfair Display,serif;font-size:20px;font-weight:400;font-style:italic">'+m.fl+"</h2>"+ptg(m.ph)+'</div><h3 style="font-size:15px;font-weight:600;color:var(--acc);margin-bottom:6px">'+m.ti+'</h3><p style="font-size:13px;color:var(--tmu);margin-bottom:14px;line-height:1.6">'+m.go+"</p>"+pb(prog,"var(--acc)")+'<div style="font-size:11px;color:var(--tmu);margin-top:5px">'+prog+"% 完成</div></div>";

h+='<div class="card card-p"><h4 style="font-size:14px;font-weight:700;color:var(--ecom);margin-bottom:14px"><span class="pill pill-e">🛒 电商线</span></h4>';
m.ec.forEach((item,i)=>{h+=ci(m.id+"-e-"+i,"<strong>"+item.t+"</strong>","cc")+'<div class="ch">💡 '+item.m+"</div>"});h+="</div>";

h+='<div class="card card-g"><h4 style="font-size:14px;font-weight:700;color:var(--phd);margin-bottom:14px"><span class="pill pill-p">🎓 博士线</span></h4>';
m.pd.forEach((item,i)=>{h+=ci(m.id+"-p-"+i,"<strong>"+item.t+"</strong>","cc")+'<div class="ch">💡 '+item.m+"</div>"});h+="</div>";

h+='<div class="card card-w"><h4 style="font-family:Playfair Display,serif;font-size:15px;font-weight:400;font-style:italic;margin-bottom:10px">Monthly Notes</h4><textarea class="na" id="nA" placeholder="记录本月进展、遇到的问题、下月调整方向..." oninput="un()">'+(S.mn[m.id]||"")+'</textarea><p style="font-size:10px;color:var(--tmu);margin-top:6px;font-style:italic">auto-saved</p></div>';return h}

function rTL(){
const phases=[{l:"启动期",s:"2026.3-6",r:"电商70 : 博士30",bg:"var(--ls)",bc:"rgba(196,180,226,0.3)",c:"var(--ld)"},{l:"成长期",s:"2026.7-12",r:"电商50 : 博士50",bg:"var(--ps)",bc:"rgba(242,160,184,0.3)",c:"var(--ecom)"},{l:"收获期",s:"2027",r:"电商30 : 博士70",bg:"var(--gs)",bc:"rgba(184,212,160,0.3)",c:"var(--phd)"}];
let h='<h2 class="st">Timeline</h2><div class="po">'+phases.map(p=>'<div class="pc" style="background:'+p.bg+";border:1.5px solid "+p.bc+'"><div style="font-size:13px;font-weight:700;color:'+p.c+'">'+p.l+'</div><div style="font-size:11px;color:var(--tmu);margin:3px 0">'+p.s+'</div><div style="font-size:10px;color:var(--tmu)">'+p.r+"</div></div>").join("")+"</div>";
const pC=["var(--ld)","var(--ecom)","var(--phd)"],pB=["var(--ls)","var(--ps)","var(--gs)"];
M.forEach(m=>{const prog=gMP(m.id),c=pC[m.ph-1],bg=pB[m.ph-1];
h+='<div class="ti" onclick="sm(\''+m.id+'\');go(\'monthly\')"><div class="tn" style="background:'+bg+";color:"+c+'">'+m.mo.replace("月","")+'</div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap"><span style="font-size:13px;font-weight:600">'+m.ti+"</span>"+ptg(m.ph)+'</div><div style="margin-top:4px">'+pb(prog,c)+'</div></div><div style="font-size:13px;font-weight:700;color:var(--acc);min-width:36px;text-align:right">'+prog+'%</div><div style="color:var(--tmu);font-size:18px">›</div></div>'});return h}

window.go=function(t){S.at=t;sv();render();scrollTo(0,0)};
window.sm=function(id){S.sm=id;sv();render()};
window.tog=function(st,k){S[st][k]=!S[st][k];sv();render()};
let nt;window.un=function(){const el=document.getElementById("nA");if(el){S.mn[S.sm]=el.value;clearTimeout(nt);nt=setTimeout(sv,500)}};

window.toggleSetup=function(){
  const p=document.getElementById("setupPanel");
  const show=p.style.display==="none";
  p.style.display=show?"block":"none";
  if(show){
    document.getElementById("cfgKey").value=CFG.apiKey||"";
    if(CFG.binId){document.getElementById("cfgBin").value=CFG.binId;document.getElementById("cfgBinRow").style.display="block"}
    const msg=document.getElementById("syncMsg");
    if(CFG.lastSync)msg.textContent="上次同步："+CFG.lastSync;
    else if(CFG.binId)msg.textContent="已配置，自动同步中";
    else msg.textContent="";
  }
};
window.doSetup=async function(){
  const msg=document.getElementById("syncMsg");
  const key=document.getElementById("cfgKey").value.trim();
  if(!key){msg.textContent="⚠️ 请先粘贴 API Key";return}
  CFG.apiKey=key;svCfg();
  msg.textContent="⏳ 正在配置...";
  if(!CFG.binId){
    const ok=await createBin();
    if(!ok){msg.textContent="❌ 创建失败，请检查 API Key 是否正确";return}
    document.getElementById("cfgBin").value=CFG.binId;
    document.getElementById("cfgBinRow").style.display="block";
  }
  await cloudSave();
  msg.textContent="✅ 同步成功！Bin ID: "+CFG.binId;
  renderSyncStatus();
  msg.textContent+=" — 现在在另一台设备打开同一网址，粘贴相同的 API Key 和 Bin ID 即可同步";
};
window.doSync=async function(){
  const msg=document.getElementById("syncMsg");
  const key=document.getElementById("cfgKey").value.trim();
  const bin=document.getElementById("cfgBin").value.trim();
  if(!key){msg.textContent="⚠️ 请先粘贴 API Key";return}
  CFG.apiKey=key;
  if(bin)CFG.binId=bin;
  svCfg();
  if(!CFG.binId){msg.textContent="⚠️ 请先点「开始同步」创建，或输入已有的 Bin ID";document.getElementById("cfgBinRow").style.display="block";return}
  msg.textContent="⏳ 正在从云端拉取...";
  const ok=await cloudLoad();
  if(ok){msg.textContent="✅ 拉取成功！数据已更新";render()}
  else{msg.textContent="❌ 拉取失败，请检查 API Key 和 Bin ID"}
  renderSyncStatus();
};

ld();render();renderSyncStatus();
// Auto-load from cloud on startup
if(CFG.binId&&CFG.apiKey){cloudLoad().then(ok=>{if(ok)render()})}
</script>
